<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>EvCharger</title>
  <style>
    :root { --green:#16a34a; --blue:#2563eb; --red:#dc2626; --gray:#9ca3af; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: -apple-system, "Segoe UI", Roboto, "Noto Sans Thai", sans-serif;
           background:#f3f4f6; color:#111827; padding:16px; max-width:520px; margin:0 auto; }
    header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
    header h1 { font-size:20px; margin:0; color:var(--green); }
    #user { font-size:13px; color:#6b7280; margin-bottom:14px; }
    .card { background:#fff; border-radius:14px; padding:16px; margin-bottom:14px;
            box-shadow:0 1px 4px rgba(0,0,0,.06); }
    .title { font-weight:700; font-size:16px; display:flex; justify-content:space-between; }
    .meta { font-size:12px; color:#6b7280; margin:2px 0 12px; }
    .conn { display:flex; align-items:center; gap:8px; padding:8px 0; border-top:1px solid #f1f1f1; }
    .conn b { flex:1; font-weight:600; }
    .dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
    button { border:0; border-radius:10px; padding:8px 14px; font-size:14px; font-weight:600;
             color:#fff; cursor:pointer; }
    button.start { background:var(--green); }
    button.stop  { background:var(--red); }
    button:disabled { background:var(--gray); cursor:not-allowed; }
    .muted { color:#9ca3af; font-size:14px; text-align:center; padding:24px; }
  </style>
</head>
<body>
  <header>
    <h1>⚡ EvCharger</h1>
  </header>
  <div id="user">กำลังเริ่มระบบ…</div>
  <div id="chargers" class="muted">กำลังโหลดสถานะตู้…</div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    // ===== ตั้งค่า 2 ค่านี้ =====
    const CONFIG = {
      LIFF_ID: 'YOUR_LIFF_ID',  // <- จาก LINE Developers Console (LIFF)
      API_BASE: 'https://evcharger-production-7271.up.railway.app', // <- CSMS บน Railway
    };

    let idTag = 'LINE-DEV'; // ใช้ LINE userId เป็น idTag เมื่อ login สำเร็จ

    async function initLiff() {
      const u = document.getElementById('user');
      try {
        if (CONFIG.LIFF_ID && CONFIG.LIFF_ID !== 'YOUR_LIFF_ID') {
          await liff.init({ liffId: CONFIG.LIFF_ID });
          if (!liff.isLoggedIn()) { liff.login(); return; }
          const p = await liff.getProfile();
          idTag = p.userId;
          u.textContent = 'สวัสดี ' + p.displayName;
        } else {
          u.textContent = '(โหมด dev — ยังไม่ได้ตั้ง LIFF_ID, ข้าม login)';
        }
      } catch (e) {
        u.textContent = 'LIFF error: ' + e.message + ' (ยังใช้งานต่อแบบ dev ได้)';
      }
    }

    const api = (path, opts) => fetch(CONFIG.API_BASE + path, opts).then((r) => r.json());
    const color = (s) => s === 'Available' ? 'var(--green)' : s === 'Charging' ? 'var(--blue)'
                       : s === 'Faulted' ? 'var(--red)' : 'var(--gray)';

    async function load() {
      const box = document.getElementById('chargers');
      let chargers = [];
      try { chargers = await api('/api/chargers'); }
      catch (e) { box.className = 'muted'; box.textContent = 'เชื่อมต่อ API ไม่ได้: ' + e.message; return; }
      if (!chargers.length) { box.className = 'muted'; box.textContent = 'ยังไม่มีตู้ออนไลน์'; return; }

      box.className = '';
      box.innerHTML = chargers.map((c) => {
        const conns = Object.values(c.connectors || {});
        const list = conns.length ? conns : [{ connectorId: 1, status: 'Unknown' }, { connectorId: 2, status: 'Unknown' }];
        const byConn = {}; Object.values(c.sessions || {}).forEach((s) => (byConn[s.connectorId] = s));
        const rows = list.map((cn) => {
          const sess = byConn[cn.connectorId];
          const btn = sess
            ? `<button class="stop" onclick="stop('${c.id}',${sess.transactionId})">หยุดชาร์จ</button>`
            : `<button class="start" onclick="start('${c.id}',${cn.connectorId})" ${cn.status !== 'Available' ? 'disabled' : ''}>เริ่มชาร์จ</button>`;
          return `<div class="conn"><span class="dot" style="background:${color(cn.status)}"></span><b>หัว ${cn.connectorId}: ${cn.status}</b>${btn}</div>`;
        }).join('');
        return `<div class="card"><div class="title"><span>${c.id}</span><span>${c.online ? '🟢' : '🔴'}</span></div>
          <div class="meta">${c.model || ''}${c.firmwareVersion ? ' · fw ' + c.firmwareVersion : ''}</div>${rows}</div>`;
      }).join('');
    }

    async function start(id, connectorId) {
      try { await api(`/api/chargers/${id}/remote-start`, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ connectorId, idTag }) }); }
      catch (e) { alert('เริ่มชาร์จไม่สำเร็จ: ' + e.message); }
      load();
    }
    async function stop(id, transactionId) {
      try { await api(`/api/chargers/${id}/remote-stop`, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ transactionId }) }); }
      catch (e) { alert('หยุดชาร์จไม่สำเร็จ: ' + e.message); }
      load();
    }

    initLiff();
    load();
    setInterval(load, 5000); // refresh สถานะทุก 5 วิ
  </script>
</body>
</html>
